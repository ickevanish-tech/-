<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Букет чувств</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <img src="img/logo.png" alt="Логотип" class="logo">
      <nav class="main-nav">
        <a href="about.html">О нас</a>
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
      </nav>
      <a class="login" href="login.html">Вход</a>
    </div>
  </header>

  <main class="auth-wrap">
    <div class="auth-box">
      <h1 class="auth-title">Вход</h1>
      <form class="auth-form" action="#" method="post">
        <input class="auth-input" type="text" name="login" placeholder="Введите логин">
        <input class="auth-input" type="password" name="password" placeholder="Введите пароль">
        <div class="auth-row">
          <a class="forgot" href="#">Забыли пароль?</a>
        </div>
        <div class="auth-actions">
          <button class="auth-btn" type="submit">Войти</button>
          <div class="auth-note">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
        </div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">Букет чувств</div>
  </footer>
</body>
</html>
