<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Каталог — Букет чувств</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <img src="img/logo.png" alt="Логотип Букет чувств" class="logo">
      <nav class="main-nav">
        <a href="about.html">О нас</a>
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
      </nav>
      <a class="login" href="login.html">Вход</a>
    </div>
  </header>

  <main style="padding-top:110px">
    <section class="popular wrap">
      <h2 class="section-title">ПОПУЛЯРНОЕ</h2>
      <div class="grid products">
        <article class="card">
          <img src="img/tovar1.png" alt="Майский букет">
          <h3>Майский букет</h3>
          <div class="price">2000 рублей</div>
        </article>
        <article class="card">
          <img src="img/tovar2.png" alt="Летний букет">
          <h3>Летний букет</h3>
          <div class="price">2500 рублей</div>
        </article>
        <article class="card">
          <img src="img/tovar3.png" alt="Весенний букет">
          <h3>Весенний букет</h3>
          <div class="price">3500 рублей</div>
        </article>
      </div>

      <div style="height:60px"></div>

      <div class="grid products">
        <article class="card">
          <img src="img/tovar4.png" alt="Летнее утро">
          <h3>Летнее утро</h3>
          <div class="price">2000 рублей</div>
        </article>
        <article class="card">
          <img src="img/tovar5.png" alt="Минимализм">
          <h3>Минимализм</h3>
          <div class="price">2500 рублей</div>
        </article>
        <article class="card">
          <img src="img/forvibe2.png" alt="Композиция">
          <h3>Авторская композиция</h3>
          <div class="price">3000 рублей</div>
        </article>
      </div>

    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">Букет чувств</div>
  </footer>
</body>
</html>
